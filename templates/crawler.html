{% extends "base.html" %}
{% block content %}
<div class="card fade-in">
    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <div>
            <h1>Initialize Crawler Job</h1>
            <p>Deploy a highly concurrent worker to map out sub-domains dynamically.</p>
        </div>
        <button id="btn-reset-all" class="btn-primary" style="background: #ff3b30;">Reset All Data</button>
    </div>
    <form id="crawler-form">
        <div class="input-group">
            <label for="url">Target Seed URL</label>
            <input type="url" id="url" name="url" placeholder="https://example.com" required>
        </div>
        <div class="input-group">
            <label for="max_depth">Max Recursion Depth</label>
            <input type="number" id="max_depth" name="max_depth" value="3" min="1" max="10">
        </div>
        <div class="input-group">
            <label for="hit_rate">Hit Rate (requests/sec)</label>
            <input type="number" id="hit_rate" name="hit_rate" value="2.0" step="0.5" min="0.5" max="10.0">
        </div>
        <div class="input-group">
            <label for="queue_capacity">Queue Capacity</label>
            <input type="number" id="queue_capacity" name="queue_capacity" value="10000" min="100">
        </div>
        <div class="input-group">
            <label for="max_urls">Max URLs to Visit</label>
            <input type="number" id="max_urls" name="max_urls" value="1000" min="10">
        </div>
        <button type="submit" class="btn-primary" id="start-btn">Deploy Worker Job</button>
    </form>
    <div id="crawler-msg" class="msg-box hidden"></div>
</div>

<div class="card fade-in dashboard-card" style="margin-top: 30px;">
    <h2>Active Job Tracking</h2>
    <div id="jobs-container" style="margin-top: 20px;">
        <p style="color:var(--text-secondary);">Listening for active crawler deployments...</p>
    </div>
</div>

<div class="card fade-in dashboard-card" style="margin-top: 30px;">
    <h2>Crawled History</h2>
    <div id="history-container" style="margin-top: 20px;">
        <p style="color:var(--text-secondary);">No historical records found.</p>
    </div>
</div>
{% endblock %}
